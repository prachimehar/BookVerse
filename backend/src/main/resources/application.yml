spring:
  application:
    name: bookverse-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/bookverse}
  jackson:
    serialization:
      INDENT_OUTPUT: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:replace-me-with-secure-key}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: bookverse

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
